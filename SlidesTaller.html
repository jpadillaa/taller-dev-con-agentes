document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in:0;color:#ffcd75;text-shadow:4px 4px 0 #000;\">AGENTES DE<br>CODIFICACI<span style=\"position:relative;display:inline-block\">O<span aria-hidden=\"true\" style=\"position:absolute;left:50%;top:-0.28em;transform:translateX(-50%);width:0.4em;height:0.4em;line-height:0;pointer-events:none\"><svg viewBox=\"0 0 24 24\" style=\"width:100%;height:100%;display:block;animation:tilstar 1.9s ease-in-out infinite;filter:drop-shadow(1.5px 1.5px 0 #000)\"><path d=\"M12 1 L15.09 8.26 L23 9.27 L17 14.14 L18.18 22 L12 18.27 L5.82 22 L7 14.14 L1 9.27 L8.91 8.26 Z\" fill=\"#ffcd75\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fspan>N<\u002Fh1>\n    <div style=\"font-family:'Press Start 2P',monospace;font-size:20px;color:#41a6f6;margin-top:22px;text-shadow:3px 3px 0 #000;\">CON CLAUDE CODE<\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-family:'Pixelify Sans',sans-serif;font-size:26px;color:#f4f4f4;margin:30px 0 0;letter-spacing:1px;\">Del requerimiento al producto<\u002Fp>\n  <div style=\"display:flex;align-items:flex-end;gap:24px;margin-top:36px;\">\n    <svg viewBox=\"0 0 12 14\" width=\"58\" height=\"68\" shape-rendering=\"crispEdges\" style=\"animation:bob 2.4s ease-in-out infinite;\"><rect x=\"5\" y=\"0\" width=\"2\" height=\"2\" fill=\"#ffcd75\"><\u002Frect><rect x=\"5\" y=\"2\" width=\"1\" height=\"2\" fill=\"#566c86\"><\u002Frect><rect x=\"2\" y=\"3\" width=\"8\" height=\"6\" fill=\"#c0cbdc\"><\u002Frect><rect x=\"3\" y=\"4\" width=\"2\" height=\"2\" fill=\"#41a6f6\"><\u002Frect><rect x=\"7\" y=\"4\" width=\"2\" height=\"2\" fill=\"#41a6f6\"><\u002Frect><rect x=\"4\" y=\"7\" width=\"4\" height=\"1\" fill=\"#1a1c2c\"><\u002Frect><rect x=\"3\" y=\"9\" width=\"6\" height=\"3\" fill=\"#94b0c2\"><\u002Frect><rect x=\"1\" y=\"9\" width=\"1\" height=\"2\" fill=\"#566c86\"><\u002Frect><rect x=\"10\" y=\"9\" width=\"1\" height=\"2\" fill=\"#566c86\"><\u002Frect><rect x=\"4\" y=\"12\" width=\"1\" height=\"2\" fill=\"#566c86\"><\u002Frect><rect x=\"7\" y=\"12\" width=\"1\" height=\"2\" fill=\"#566c86\"><\u002Frect><\u002Fsvg>\n    <div style=\"font-family:'Press Start 2P',monospace;font-size:18px;color:#38b764;animation:blink 1.1s step-end infinite;\">▶ PRESS START<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:30px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:16px;color:#94b0c2;\">Autor: Jesse Padilla   ·   Profesor DISC/CREA<\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Qué es un agente\" data-screen-label=\"02\" data-speaker-notes=\"Define el agente de codificacion frente al autocompletado. El agente planea, lee la base de codigo, edita archivos, ejecuta pruebas e itera en un ciclo.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:52px 64px 60px;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;top:20px;right:26px;font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:1px;color:#94b0c2;\"><span style=\"color:#ffcd75;\">♦<\u002Fspan> MUNDO 1 · INTRO &nbsp;<span style=\"color:#41a6f6;\">02/20<\u002Fspan><\u002Fdiv>\n  <div style=\"display:inline-block;align-self:flex-start;background:#ef7d57;color:#1a1c2c;font-family:'Silkscreen',monospace;font-size:14px;padding:6px 14px;letter-spacing:2px;box-shadow:4px 4px 0 rgba(0,0,0,.5);margin-bottom:18px;\">MUNDO 1 — INTRODUCCIÓN<\u002Fdiv>\n  <h2 style=\"font-family:'Press Start 2P',monospace;font-size:24px;line-height:1.45;margin:0 0 26px;color:#ffcd75;text-shadow:3px 3px 0 #000;\">¿QU<span style=\"position:relative;display:inline-block\">E<span aria-hidden=\"true\" style=\"position:absolute;left:50%;top:-0.28em;transform:translateX(-50%);width:0.4em;height:0.4em;line-height:0;pointer-events:none\"><svg viewBox=\"0 0 24 24\" style=\"width:100%;height:100%;display:block;animation:tilstar 1.9s ease-in-out infinite;filter:drop-shadow(1.5px 1.5px 0 #000)\"><path d=\"M12 1 L15.09 8.26 L23 9.27 L17 14.14 L18.18 22 L12 18.27 L5.82 22 L7 14.14 L1 9.27 L8.91 8.26 Z\" fill=\"#ffcd75\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fspan> ES UN AGENTE DE CODIFICACI<span style=\"position:relative;display:inline-block\">O<span aria-hidden=\"true\" style=\"position:absolute;left:50%;top:-0.28em;transform:translateX(-50%);width:0.4em;height:0.4em;line-height:0;pointer-events:none\"><svg viewBox=\"0 0 24 24\" style=\"width:100%;height:100%;display:block;animation:tilstar 1.9s ease-in-out infinite;filter:drop-shadow(1.5px 1.5px 0 #000)\"><path d=\"M12 1 L15.09 8.26 L23 9.27 L17 14.14 L18.18 22 L12 18.27 L5.82 22 L7 14.14 L1 9.27 L8.91 8.26 Z\" fill=\"#ffcd75\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fspan>N?<\u002Fh2>\n  <div style=\"display:flex;gap:26px;align-items:stretch;\">\n    <div style=\"flex:1;background:#29366f;border:3px solid #566c86;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:22px 24px;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:15px;color:#94b0c2;letter-spacing:1px;margin-bottom:12px;\">AUTOCOMPLETADO<\u002Fdiv>\n      <p style=\"font-size:22px;line-height:1.55;margin:0;color:#c0cbdc;\">Sugiere la siguiente línea. Reactivo, dentro de un solo archivo, sin idea del objetivo.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#29366f;border:3px solid #41a6f6;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:22px 24px;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:15px;color:#41a6f6;letter-spacing:1px;margin-bottom:12px;\">AGENTE<\u002Fdiv>\n      <p style=\"font-size:22px;line-height:1.55;margin:0;\">Recibe un objetivo y lo persigue: <b style=\"color:#ffcd75;\">planea, lee el repo, edita archivos, ejecuta pruebas e itera<\u002Fb>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:26px;background:#29366f;border:4px solid #f4f4f4;box-shadow:0 0 0 4px #1a1c2c,8px 8px 0 rgba(0,0,0,.5);padding:20px 26px;position:relative;\">\n    <div style=\"font-family:'Silkscreen',monospace;font-size:14px;color:#ffcd75;letter-spacing:1px;margin-bottom:10px;\">▸ EL CICLO DEL AGENTE<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-family:'Press Start 2P',monospace;font-size:15px;\">\n      <span style=\"color:#41a6f6;\">LEER<\u002Fspan><span style=\"color:#566c86;\">→<\u002Fspan><span style=\"color:#38b764;\">EDITAR<\u002Fspan><span style=\"color:#566c86;\">→<\u002Fspan><span style=\"color:#ef7d57;\">EJECUTAR<\u002Fspan><span style=\"color:#566c86;\">→<\u002Fspan><span style=\"color:#ffcd75;\">REPETIR<\u002Fspan><span style=\"color:#566c86;font-size:20px;\">↺<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:18px;bottom:-2px;color:#f4f4f4;\">▼<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:10%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"El harness importa\" data-screen-label=\"03\" data-speaker-notes=\"Idea central: el harness importa mas que el modelo. Casi todos los agentes son una interfaz al mismo loop; la diferenciacion esta en el harness que rodea al modelo: herramientas, contexto, permisos, integraciones.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:52px 64px 60px;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;top:20px;right:26px;font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:1px;color:#94b0c2;\"><span style=\"color:#ffcd75;\">♦<\u002Fspan> MUNDO 1 · INTRO &nbsp;<span style=\"color:#41a6f6;\">03/20<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:'Press Start 2P',monospace;font-size:24px;line-height:1.45;margin:0 0 30px;color:#ffcd75;text-shadow:3px 3px 0 #000;\">EL HARNESS IMPORTA<br>M<span style=\"position:relative;display:inline-block\">A<span aria-hidden=\"true\" style=\"position:absolute;left:50%;top:-0.28em;transform:translateX(-50%);width:0.4em;height:0.4em;line-height:0;pointer-events:none\"><svg viewBox=\"0 0 24 24\" style=\"width:100%;height:100%;display:block;animation:tilstar 1.9s ease-in-out infinite;filter:drop-shadow(1.5px 1.5px 0 #000)\"><path d=\"M12 1 L15.09 8.26 L23 9.27 L17 14.14 L18.18 22 L12 18.27 L5.82 22 L7 14.14 L1 9.27 L8.91 8.26 Z\" fill=\"#ffcd75\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fspan>S QUE EL MODELO<\u002Fh2>\n  <div style=\"display:flex;gap:40px;align-items:center;flex:1;\">\n    <div style=\"flex:0 0 320px;display:flex;justify-content:center;\">\n      <div style=\"position:relative;width:300px;height:300px;display:flex;align-items:center;justify-content:center;\">\n        <div style=\"position:absolute;inset:0;background:#29366f;border:3px solid #41a6f6;box-shadow:6px 6px 0 rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding-top:14px;\"><span style=\"font-family:'Silkscreen',monospace;font-size:15px;color:#41a6f6;letter-spacing:1px;\">HARNESS<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;width:150px;height:150px;background:#ef7d57;border:3px solid #ffcd75;box-shadow:4px 4px 0 rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;text-align:center;\"><span style=\"font-family:'Press Start 2P',monospace;font-size:13px;color:#1a1c2c;line-height:1.5;\">MODELO<\u002Fspan><\u002Fdiv>\n        <span style=\"position:absolute;top:46px;left:18px;font-family:'JetBrains Mono';font-size:14px;color:#94b0c2;\">tools<\u002Fspan>\n        <span style=\"position:absolute;top:46px;right:14px;font-family:'JetBrains Mono';font-size:14px;color:#94b0c2;\">contexto<\u002Fspan>\n        <span style=\"position:absolute;bottom:46px;left:14px;font-family:'JetBrains Mono';font-size:14px;color:#94b0c2;\">permisos<\u002Fspan>\n        <span style=\"position:absolute;bottom:46px;right:8px;font-family:'JetBrains Mono';font-size:14px;color:#94b0c2;\">integración<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\">\n      <p style=\"font-size:23px;line-height:1.6;margin:0 0 24px;\">Casi todos los agentes son <b style=\"color:#41a6f6;\">una interfaz al mismo loop<\u002Fb>. El modelo es intercambiable.<\u002Fp>\n      <div style=\"background:#29366f;border:4px solid #f4f4f4;box-shadow:0 0 0 4px #1a1c2c,8px 8px 0 rgba(0,0,0,.5);padding:20px 26px;position:relative;\">\n        <p style=\"font-size:22px;line-height:1.55;margin:0;\">“La diferenciación real no está en el modelo, sino en el <b style=\"color:#ffcd75;\">harness<\u002Fb> que lo rodea: qué herramientas le das, cómo gestionas el contexto y qué puede ejecutar.”<\u002Fp>\n        <div style=\"position:absolute;right:18px;bottom:-2px;color:#f4f4f4;\">▼<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:15%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Cuatro alternativas\" data-screen-label=\"04\" data-speaker-notes=\"Las cuatro alternativas principales cubren el espectro completo: desde el editor nativo de IA (Cursor) hasta el CLI agnostico al proveedor (OpenCode), con Claude Code y Codex CLI en medio.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:52px 64px 60px;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;top:20px;right:26px;font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:1px;color:#94b0c2;\"><span style=\"color:#ffcd75;\">♦<\u002Fspan> MUNDO 1 · INTRO &nbsp;<span style=\"color:#41a6f6;\">04/20<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:'Press Start 2P',monospace;font-size:24px;line-height:1.45;margin:0 0 8px;color:#ffcd75;text-shadow:3px 3px 0 #000;\">LAS CUATRO ALTERNATIVAS<\u002Fh2>\n  <p style=\"font-size:17px;color:#94b0c2;margin:0 0 18px;\">Cubren el espectro completo, del editor nativo de IA al CLI agnóstico al proveedor.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;flex:1;\">\n    <div style=\"background:#29366f;border:3px solid #41a6f6;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:14px 15px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:14px;color:#41a6f6;margin-bottom:12px;\">1 · CLAUDE CODE<\u002Fdiv>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">NATURALEZA<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0 0 11px;\">Comercial · propietario (Anthropic).<\u002Fp>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">MODELOS<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0 0 11px;\">Exclusivo familia Claude (Sonnet, Opus, Haiku) vía API formal.<\u002Fp>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#ffcd75;letter-spacing:1px;margin-bottom:3px;\">FACTOR DIFERENCIAL<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0;\">Integración profunda con Anthropic: <b style=\"color:#ffcd75;\">hooks programables<\u002Fb> en terminal y ventana de contexto optimizada para refactors extensos.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #38b764;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:14px 15px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:14px;color:#38b764;margin-bottom:12px;\">2 · CODEX CLI<\u002Fdiv>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">NATURALEZA<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0 0 11px;\">Comercial · propietario (OpenAI). Motor cerrado; wrappers de comunidad.<\u002Fp>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">MODELOS<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0 0 11px;\">Exclusivo modelos GPT de OpenAI optimizados para código.<\u002Fp>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#ffcd75;letter-spacing:1px;margin-bottom:3px;\">FACTOR DIFERENCIAL<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0;\"><b style=\"color:#ffcd75;\">Sandbox a nivel de kernel<\u002Fb> en entornos de nube aislados; mitiga riesgos al ejecutar scripts generados por la IA.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #ef7d57;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:14px 15px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:14px;color:#ef7d57;margin-bottom:12px;\">3 · CURSOR<\u002Fdiv>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">NATURALEZA<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0 0 11px;\">Comercial · freemium (Anysphere).<\u002Fp>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">MODELOS<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0 0 11px;\">Multimodelo: alterna Claude, GPT, modelos locales y configs propias.<\u002Fp>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#ffcd75;letter-spacing:1px;margin-bottom:3px;\">FACTOR DIFERENCIAL<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.4;margin:0;\">UX integrada: <b style=\"color:#ffcd75;\">Composer<\u002Fb> (edición multiarchivo en paralelo) y Tab predictivo que anticipa ediciones multilínea. \u002Ftd>\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;color:#ffcd75;\">Edición multiarchivo en paralelo (Composer) y tabulación predictiva<\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"background:#222a55;\">\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;color:#ffcd75;font-weight:700;\">OpenCode<\u002Ftd>\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;\">Comunidad OSS<\u002Ftd>\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;color:#38b764;\">Open Source<\u002Ftd>\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;\">Agnóstico<\u002Ftd>\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;\">Terminal / IDE<\u002Ftd>\n        <td style=\"padding:14px 10px;border:1px solid #3b5dc9;color:#ffcd75;\">Privacidad estricta de datos locales (Privacy-first), sin telemetría<\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:25%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Otras herramientas\" data-screen-label=\"06\" data-speaker-notes=\"Ecosistema mas alla de las cuatro: Kimi Code CLI de Moonshot (terminal, modelo de pesos abiertos, subagentes paralelos) y Cline en VS Code (Plan y Act, +30 proveedores). Menciones: Gemini CLI y GitHub Copilot.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:52px 64px 60px;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;top:20px;right:26px;font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:1px;color:#94b0c2;\"><span style=\"color:#ffcd75;\">♦<\u002Fspan> MUNDO 1 · INTRO &nbsp;<span style=\"color:#41a6f6;\">06/20<\u002Fspan><\u002Fdiv>\n  <h2 Fdiv>\n      <div style=\"display:flex;gap:18px;\">\n        <div style=\"flex:1;\"><div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">NATURALEZA<\u002Fdiv><p style=\"font-size:14px;line-height:1.4;margin:0;\">Open source (extensión VS Code).<\u002Fp><\u002Fdiv>\n        <div style=\"flex:1;\"><div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">MODELOS<\u002Fdiv><p style=\"font-size:14px;line-height:1.4;margin:0;\">Multimodelo: <b style=\"color:#ffcd75;\">+30 proveedores<\u002Fb> agnóstico.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#ffcd75;letter-spacing:1px;margin:10px 0 3px;\">FACTOR DIFERENCIAL<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.4;margin:0;\">Ciclo autónomo <b style=\"color:#ffcd75;\">Plan-and-Act<\u002Fb> para tareas de software de punta a punta.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #ef7d57;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:14px 18px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:14px;color:#ef7d57;margin-bottom:10px;\">3 · GOOGLE ANTIGRAVITY<\u002Fdiv>\n      <div style=\"display:flex;gap:18px;\">\n        <div style=\"flex:1;\"><div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">NATURALEZA<\u002Fdiv><p style=\"font-size:14px;line-height:1.4;margin:0;\">Comercial / capa gratuita + tiers (Google).<\u002Fp><\u002Fdiv>\n        <div style=\"flex:1;\"><div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">MODELOS<\u002Fdiv><p style=\"font-size:14px;line-height:1.4;margin:0;\">Multimodelo: Gemini + externos (Claude, GPT).<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#ffcd75;letter-spacing:1px;margin:10px 0 3px;\">FACTOR DIFERENCIAL<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.4;margin:0;\">Suite unificada sobre un mismo motor agéntico: alterna entre <b style=\"color:#ffcd75;\">CLI (TUI)<\u002Fb> e <b style=\"color:#ffcd75;\">IDE<\u002Fb>, delega subtareas en segundo plano e interactúa por Artifacts.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #ffcd75;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:14px 18px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Silkscreen',monospace;font-size:14px;color:#ffcd75;margin-bottom:10px;\">4 · GITHUB COPILOT<\u002Fdiv>\n      <div style=\"display:flex;gap:18px;\">\n        <div style=\"flex:1;\"><div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">NATURALEZA<\u002Fdiv><p style=\"font-size:14px;line-height:1.4;margin:0;\">Comercial (Microsoft / GitHub).<\u002Fp><\u002Fdiv>\n        <div style=\"flex:1;\"><div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#94b0c2;letter-spacing:1px;margin-bottom:3px;\">MODELOS<\u002Fdiv><p style=\"font-size:14px;line-height:1.4;margin:0;\">Multimodelo: OpenAI + alternativas seleccionables.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Silkscreen',monospace;font-size:10px;color:#ffcd75;letter-spacing:1px;margin:10px 0 3px;\">FACTOR DIFERENCIAL<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.4;margin:0;\">Ecosistema maduro: autocompletado + chat + <b style=\"color:#ffcd75;\">modo agente<\u002Fb> integrado al repo y editor.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:30%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n -shadow:5px 5px 0 rgba(0,0,0,.5);padding:18px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-family:'Silkscreen';font-size:14px;color:#41a6f6;margin-bottom:8px;\">SERVIDORES MCP<\u002Fdiv><p style=\"font-size:17px;line-height:1.45;margin:0;\">Conecta herramientas y datos externos.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #38b764;box-shadow:5px 5px 0 rgba(0,0,0,.5);padding:18px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-family:'Silkscreen';font-size:14px;color:#38b764;margin-bottom:8px;\">COMANDOS SLASH<\u002Fdiv><p style=\"font-size:17px;line-height:1.45;margin:0;\">Define flujos repetidos a tu medida.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #ffcd75;box-shadow:5px 5px 0 rgba(0,0,0,.5);padding:18px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-family:'Silkscreen';font-size:14px;color:#ffcd75;margin-bottom:8px;\">HOOKS PROGRAMABLES<\u002Fdiv><p style=\"font-size:17px;line-height:1.45;margin:0;\">Dispara scripts en eventos del ciclo del agente.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #ef7d57;box-shadow:5px 5px 0 rgba(0,0,0,.5);padding:18px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-family:'Silkscreen';font-size:14px;color:#ef7d57;margin-bottom:8px;\">CLAUDE -P · HEADLESS<\u002Fdiv><p style=\"font-size:17px;line-height:1.45;margin:0;\">Modo no interactivo para scripts y pipes.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #41a6f6;box-shadow:5px 5px 0 rgba(0,0,0,.5);padding:18px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-family:'Silkscreen';font-size:14px;color:#41a6f6;margin-bottom:8px;\">GITHUB ACTIONS<\u002Fdiv><p style=\"font-size:17px;line-height:1.45;margin:0;\">@claude en issues y PRs dentro de CI.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #38b764;box-shadow:5px 5px 0 rgba(0,0,0,.5);padding:18px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-family:'Silkscreen';font-size:14px;color:#38b764;margin-bottom:8px;\">CLAUDE AGENT SDK<\u002Fdiv><p style=\"font-size:17px;line-height:1.45;margin:0;\">Embebe el agente en tus propias apps.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:85%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Inventario CC\" data-screen-label=\"18\" data-speaker-notes=\"Inventario de videojuego con las herramientas esenciales de Claude Code por fase y por que importa cada una. Resumen accionable del workflow.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:44px 56px 56px;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;top:20px;right:26px;font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:1px;color:#94b0c2;\"><span style=\"color:#ffcd75;\">♦<\u002Fspan> MUNDO 3 · CLAUDE CODE &nbsp;<span style=\"color:#41a6f6;\">18/20<\u002Fspan><\u002Fdiv>\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\"><h2 style=\"font-family:'Press Start 2P',monospace;font-size:22px;margin:0;color:#ffcd75;text-shadow:3px 3px 0 #000;\">INVENTARIO<\u002Fh2><span style=\"font-family:'Silkscreen';font-size:14px;color:#94b0c2;\">— CLAUDE CODE POR FASE<\u002Fspan><\u002Fdiv>\n  <table style=\"width:100%;border-collapse:collapse;table-layout:fixed;border:3px solid #41a6f6;box-shadow:6px 6px 0 rgba(0,0,0,.5);\">\n    <colgroup><col style=\"width:28%\"><col style=\"width:20%\"><col style=\"width:52%\"><\u002Fcolgroup>\n    <thead><tr style=\"background:#41a6f6;\"><th style=\"pa       <tr style=\"background:#29366f;\"><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ffcd75;font-weight:700;\">⚔ Edición + Bash<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ffcd75;\">Implementación<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;\">Edita y corre el loop agéntico con permisos por acción.<\u002Ftd><\u002Ftr>\n      <tr style=\"background:#222a55;\"><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ffcd75;font-weight:700;\">◈ Tests · hooks · /rewind<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ef7d57;\">Verificación<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;\">Valida en cada cambio y revierte a checkpoints.<\u002Ftd><\u002Ftr>\n      <tr style=\"background:#29366f;\"><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ffcd75;font-weight:700;\">⟁ /compact · /clear<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ef7d57;\">Verificación<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;\">Gestiona la ventana de contexto en sesiones largas.<\u002Ftd><\u002Ftr>\n      <tr style=\"background:#222a55;\"><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#ffcd75;font-weight:700;\">⌬ MCP · -p · SDK · Actions<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;color:#c0cbdc;\">Automatización<\u002Ftd><td style=\"padding:9px 12px;border:1px solid #3b5dc9;\">Integra y automatiza el agente fuera del terminal.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:90%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Buenas prácticas CC\" data-screen-label=\"19\" data-speaker-notes=\"Buenas practicas de Claude Code: mantener un CLAUDE.md claro, usar Plan mode antes de editar, y apoyarse en permisos, hooks y checkpoints de /rewind para que todo sea seguro y reversible.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:52px 64px 60px;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;top:20px;right:26px;font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:1px;color:#94b0c2;\"><span style=\"color:#ffcd75;\">♦<\u002Fspan> MUNDO 3 · CLAUDE CODE &nbsp;<span style=\"color:#41a6f6;\">19/20<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:'Press Start 2P',monospace;font-size:22px;line-height:1.45;margin:0 0 8px;color:#ffcd75;text-shadow:3px 3px 0 #000;\">BUENAS PR<span style=\"position:relative;display:inline-block\">A<span aria-hidden=\"true\" style=\"position:absolute;left:50%;top:-0.28em;transform:translateX(-50%);width:0.4em;height:0.4em;line-height:0;pointer-events:none\"><svg viewBox=\"0 0 24 24\" style=\"width:100%;height:100%;display:block;animation:tilstar 1.9s ease-in-out infinite;filter:drop-shadow(1.5px 1.5px 0 #000)\"><path d=\"M12 1 L15.09 8.26 L23 9.27 L17 14.14 L18.18 22 L12 18.27 L5.82 22 L7 14.14 L1 9.27 L8.91 8.26 Z\" fill=\"#ffcd75\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fspan>CTICAS<\u002Fh2>\n  <p style=\"font-size:19px;color:#94b0c2;margin:0 0 30px;\">Tres reglas para subir de nivel sin sustos.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;flex:1;\">\n    <div style=\"background:#29366f;border:3px solid #41a6f6;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:24px;display:flex;flex-direction:column;\"><div style=\"font-family:'Press Start 2P';font-size:20px;color:#41a6f6;margin-bottom:18px;\">1↑<\u002Fdiv><div style=\"font-family:'Silkscreen';font-size:15px;color:#f4f4f4;margin-bottom:14px;\">CUIDA EL CLAUDE.md<\u002Fdiv><p style=\"font-size:19px;line-height:1.55;margin:0;\">Un <b style=\"color:#ffcd75;\">CLAUDE.md<\u002Fb> claro hace al agente preciso. El contexto es tu mejor stat.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #38b764;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:24px;display:flex;flex-direction:column;\"><div style=\"font-family:'Press Start 2P';font-size:20px;color:#38b764;margin-bottom:18px;\">2↑<\u002Fdiv><div style=\"font-family:'Silkscreen';font-size:15px;color:#f4f4f4;margin-bottom:14px;\">PLANEA ANTES DE EDITAR<\u002Fdiv><p style=\"font-size:19px;line-height:1.55;margin:0;\">Usa Plan mode y revisa el plan antes de dejar que edite.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#29366f;border:3px solid #ffcd75;box-shadow:6px 6px 0 rgba(0,0,0,.5);padding:24px;display:flex;flex-direction:column;\"><div style=\"font-family:'Press Start 2P';font-size:20px;color:#ffcd75;margin-bottom:18px;\">3↑<\u002Fdiv><div style=\"font-family:'Silkscreen';font-size:15px;color:#f4f4f4;margin-bottom:14px;\">PERMISOS, HOOKS Y /REWIND<\u002Fdiv><p style=\"font-size:19px;line-height:1.55;margin:0;\">Permisos + hooks + checkpoints = red de seguridad. Combínalos con Git.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:16px;background:#10111c;border-top:3px solid #000;\"><div style=\"height:100%;width:95%;background:#38b764;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.18);\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Cierre · Q&amp;A\" data-screen-label=\"20\" data-speaker-notes=\"Cierre. Recorrimos: que es un agente, el harness, las alternativas, abiertos vs cerrados y el workflow completo de OpenCode y de Claude Code del requerimiento al producto. Abrir espacio para preguntas.\" style=\"background:#1a1c2c;color:#f4f4f4;font-family:'JetBrains Mono',monospace;box-sizing:border-box;padding:48px 64px 56px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;position:relative;\">\n  <div style=\"po
